name: Release

# Push a version tag (e.g. v1.0.1) to build both platforms and publish a
# GitHub Release with the macOS .app (zipped) and the Windows .exe attached.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OCR tools
        run: brew install tesseract ghostscript
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build .app
        run: pyinstaller --noconfirm dmp_doorchart.spec
      - name: Zip .app
        run: |
          cd dist
          ditto -c -k --keepParent "DMP WS & Door Chart Generator.app" \
            "DMP-WS-Door-Chart-Generator-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/DMP-WS-Door-Chart-Generator-macOS.zip
          # Temporary hand-off to the release job — published Release assets
          # are stored separately and don't count against Actions storage.
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    env:
      # Code signing runs only when these secrets are set (see README,
      # "Code signing"). Until then the build still succeeds, just unsigned.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OCR tools
        run: choco install --no-progress -y tesseract ghostscript
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build app (one-folder)
        run: pyinstaller --noconfirm dmp_doorchart.spec
      - name: Sign the .exe (Azure Trusted Signing)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.1   # verify latest: github.com/Azure/trusted-signing-action/releases
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
          files-folder: dist/DMP WS & Door Chart Generator
          files-folder-filter: exe
      - name: Zip the app folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DMP WS & Door Chart Generator" `
            -DestinationPath "dist/DMP-WS-Door-Chart-Generator-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/DMP-WS-Door-Chart-Generator-Windows.zip
          retention-days: 1

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*
            artifacts/windows/*
