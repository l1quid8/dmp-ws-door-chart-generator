name: Release

# Push a version tag (e.g. v1.0.1) to build both platforms and publish a
# GitHub Release with the macOS .app (zipped) and the Windows .exe attached.
on:
  push:
    tags:
      - 'v*'

jobs:
  # The in-app updater compares the bundled VERSION against the latest release
  # tag, so they must match. Fail fast if a tag is pushed that disagrees with
  # the VERSION file (this has drifted before — e.g. a mistaken v1.4.0).
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify VERSION matches tag
        run: |
          test "v$(cat VERSION)" = "${GITHUB_REF_NAME}" \
            || { echo "VERSION ($(cat VERSION)) != tag ${GITHUB_REF_NAME}"; exit 1; }

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # macos-latest runners are Apple Silicon (arm64), and tkinterdnd2 0.5.0
      # ships ONLY a Tcl 9 tkdnd for osx-arm64 (libtcl9tkdnd2.9.5.dylib). The
      # actions/setup-python interpreter bundles Tk 8.6, which produces a bundle
      # that crashes at launch with "interpreter uses an incompatible stubs
      # mechanism". Build with Homebrew's Tk 9 Python instead — this matches
      # build_mac.command, whose local builds run correctly.
      - name: Install Python 3.13 (Tk 9) + OCR tools
        run: brew install python@3.13 python-tk@3.13 tesseract ghostscript
      - name: Build .app
        run: |
          PY="$(brew --prefix python@3.13)/bin/python3.13"
          "$PY" -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pyinstaller --noconfirm dmp_doorchart.spec
      - name: Zip .app
        run: |
          cd dist
          ditto -c -k --keepParent "DMP WS & Door Chart Generator.app" \
            "DMP-WS-Door-Chart-Generator-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/DMP-WS-Door-Chart-Generator-macOS.zip
          # Temporary hand-off to the release job — published Release assets
          # are stored separately and don't count against Actions storage.
          retention-days: 1

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OCR tools
        run: choco install --no-progress -y tesseract ghostscript
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build app (one-folder)
        run: pyinstaller --noconfirm dmp_doorchart.spec
      - name: Zip the app folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DMP WS & Door Chart Generator" `
            -DestinationPath "dist/DMP-WS-Door-Chart-Generator-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/DMP-WS-Door-Chart-Generator-Windows.zip
          retention-days: 1

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-build release notes from commits/PRs so a release is never
          # published blank. Hand-edit afterward for a polished, grouped
          # changelog on larger releases.
          generate_release_notes: true
          files: |
            artifacts/macos/*
            artifacts/windows/*
