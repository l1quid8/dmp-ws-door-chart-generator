name: Release

# Push a version tag (e.g. v1.0.1) to build both platforms and publish a
# GitHub Release with the macOS .app (zipped) and the Windows .exe attached.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OCR tools
        run: brew install tesseract ghostscript
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build .app
        run: pyinstaller --noconfirm dmp_doorchart.spec
      - name: Zip .app
        run: |
          cd dist
          ditto -c -k --keepParent "DMP WS & Door Chart Generator.app" \
            "DMP-WS-Door-Chart-Generator-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/DMP-WS-Door-Chart-Generator-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OCR tools
        run: choco install --no-progress -y tesseract ghostscript
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build .exe
        run: pyinstaller --noconfirm dmp_doorchart.spec
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: "dist/DMP WS & Door Chart Generator.exe"

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*
            artifacts/windows/*
